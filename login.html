<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#F7F5F0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>DIGG X GONGSIM</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body class="safe-area-top safe-area-bottom">
  <div id="login-view" class="login-view">
    <!-- Row 1: 앱 이름 -->
    <div class="login-logo">
      <h1 class="app-title">DIGG</h1>
      <p class="app-subtitle">× GONGSIM</p>
    </div>

    <!-- Row 2: 구글 로그인 버튼 -->
    <button id="btn-google-login" class="btn-google" onclick="loginWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.03 24.03 0 0 0 0 21.56l7.98-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      구글 계정으로 로그인
    </button>

    <!-- Row 3: 자동 로그인 -->
    <div class="auto-login-area">
      <label class="auto-login-toggle">
        <input type="checkbox" id="chk-auto-login" onchange="toggleAutoLogin(this.checked)">
        <span class="toggle-slider"></span>
      </label>
      <span class="auto-login-label">자동 로그인</span>
    </div>

    <!-- Row 4: 계정 전환 -->
    <button id="btn-switch-account" class="btn-switch" onclick="switchAccount()">
      다른 계정으로 전환
    </button>
  </div>

  <!-- Auth Module -->
  <script src="js/modules/state.js"></script>
  <script src="js/modules/auth.js"></script>
</body>
</html>
